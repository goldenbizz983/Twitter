<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="CSS/fifth.css">
    <link rel="icon" href="image/twit logo.png">
    <script src="https://kit.fontawesome.com/71b318ddd9.js" crossorigin="anonymous"></script>
</head>
<body>

    <main>

        <aside>
              <div class="asi-div">
                <img class="logo" src="image/twitter-removebg-preview.png" alt="">
                <ul class="logo-ul">
                    <li><i class="fa-solid fa-house"></i></li>
                    <li><i class="fa-solid fa-magnifying-glass"></i></li>
                    <li><i class="fa-solid fa-bell"></i></li>
                    <li><i class="fa-solid fa-message"></i></li>
                    <li> <i class="fa-solid fa-robot"></i></li>
                    <li> <i class="fa-solid fa-star"></i></li>
                    <li> <i class="fa-solid fa-circle-user"></i></li>
                    <li> <i class="fa-solid fa-ellipsis"></i></li>
                </ul>
                </div>
                <div class="icon-div">
                    <i class="fa-solid fa-pen-to-square"></i>
                </div>
                <img class="my-pro" src="image/golden biz logo.jpeg" alt="">
        </aside>

        <div class="center">

            <section>
                <h3 class="head-txt">
                    CHAT
                </h3>
                <div class="head-div">
                    <button class="head-div1">All  <i class="fa-solid fa-angle-down"></i></button>
                    <button class="head-div2"><i class="fa-regular fa-envelope"></i></button>
                    <button class="head-div3"><i class="fa-regular fa-comment"></i></button>
                </div>
            </section>

            <nav>
                <div class="post1">
                    <input class="textarea"  type="text" name=""  placeholder="Search">  
                    <div class="post-div">
                        <h5 class="post1-h5">Conversations (1)</h5>
                    <p class="post1-p">Messages</p>
                </div>
                </div>
                <!-- <div class="post2">
                     <i class="fa-regular fa-comment"></i>
                     <h6>Empty inbox</h6>
                     <p>Message someone</p>
                </div> -->
            </nav>

        </div>

        <div class="right-sidebar">
        <div class="circle">
            <i class="fa-regular fa-comment"></i>
        </div>
        <h5 class="start">Start Conversation</h5>
            <p class="choose">Choose from your existing conversations, or start a new one.</p>
            <button class="new-bt">New chat</button>
        </div>

                        <!-- BOTTOM NAV — visible only on mobile -->
<div class="bottom-nav">
    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-bell"></i>
    <i class="fa-solid fa-message"></i>
    <i class="fa-solid fa-robot"></i>
</div>

    </main>

</body>
</html>
